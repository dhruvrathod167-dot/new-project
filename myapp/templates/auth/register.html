<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ARCHAUS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:#f8f6f1;
            font-family:'Montserrat',sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }
        .register-container{
            background:rgba(255,255,255,.85);
            backdrop-filter:blur(24px);
            border:1px solid rgba(201,169,110,.2);
            border-radius:24px;
            padding:50px 45px;
            max-width:480px;
            width:100%;
            box-shadow:0 20px 60px rgba(17,17,17,.08);
        }
        h1{
            font-family:'Cormorant Garamond',serif;
            font-size:32px;
            font-weight:400;
            color:#111;
            margin-bottom:6px;
        }
        .subtitle{
            font-size:12px;
            letter-spacing:.2em;
            color:rgba(17,17,17,.5);
            margin-bottom:30px;
            text-transform:uppercase;
        }
        .form-group{
            margin-bottom:18px;
        }
        label{
            display:block;
            font-size:10px;
            letter-spacing:.15em;
            text-transform:uppercase;
            color:rgba(17,17,17,.6);
            margin-bottom:4px;
        }
        input{
            width:100%;
            padding:12px 14px;
            border:1px solid rgba(201,169,110,.25);
            border-radius:10px;
            background:rgba(255,255,255,.7);
            font-size:14px;
            font-family:'Montserrat',sans-serif;
            transition:border-color .3s;
            outline:none;
            color:#111;
        }
        input:focus{
            border-color:#c9a96e;
            box-shadow:0 0 0 3px rgba(201,169,110,.1);
        }
        .password-hint{
            font-size:10px;
            color:rgba(17,17,17,.4);
            margin-top:4px;
        }
        .btn{
            width:100%;
            padding:14px;
            background:#c9a96e;
            color:white;
            border:none;
            border-radius:10px;
            font-size:13px;
            letter-spacing:.15em;
            text-transform:uppercase;
            font-weight:500;
            cursor:pointer;
            transition:background .3s;
            margin-top:8px;
            font-family:'Montserrat',sans-serif;
        }
        .btn:hover{
            background:#b8955a;
        }
        .messages{
            margin-bottom:20px;
        }
        .message{
            padding:10px 14px;
            border-radius:8px;
            font-size:12px;
            margin-bottom:8px;
        }
        .message.error{
            background:rgba(220,53,69,.08);
            border:1px solid rgba(220,53,69,.2);
            color:#b02a37;
        }
        .message.success{
            background:rgba(25,135,84,.08);
            border:1px solid rgba(25,135,84,.2);
            color:#0f6a3a;
        }
        .login-link{
            text-align:center;
            font-size:12px;
            color:rgba(17,17,17,.5);
            margin-top:20px;
        }
        .login-link a{
            color:#c9a96e;
            text-decoration:none;
            font-weight:500;
        }
        .login-link a:hover{
            text-decoration:underline;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>ARCHAUS</h1>
        <p class="subtitle">Create Account</p>
        
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
        {% endif %}
        
        <!-- ✅ FORM WITH CSRF TOKEN -->
        <form method="post" action="/auth/register/">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" placeholder="John Doe" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@archaus.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••••••" required minlength="12">
                <div class="password-hint">Must be at least 12 characters with uppercase, lowercase, number &amp; special character</div>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••••••" required minlength="12">
            </div>
            
            <button type="submit" class="btn">Create Account →</button>
        </form>
        
        <div class="login-link">
            Already have an account? <a href="/auth/login/">Sign In</a>
        </div>
    </div>
</body>
</html>
